<html>
  <head>
    <title>Tetris</title>
    <style>
      button:hover {
        background-color: #6504a1 !important;
      }
      button:active {
        background-color: #9969d0 !important;
      }
      html {
        overflow-y: hidden;
      }
    </style>
  </head>
  <body>
    <canvas id="canvas" width="400" height="680"> </canvas>
    <canvas
      id="nextShapeCanvas"
      width="200"
      height="200"
      style="position: absolute; top: 8"
    >
    </canvas>
    <canvas
      id="scoreCanvas"
      width="200"
      height="200"
      style="position: absolute; top: 220"
    >
    </canvas>

    <button
      style="
        width: 64px;
        height: 64px;
        border-radius: 50%;
        background-color: #c69ee2;
        border-style: 1px;
        position: relative;
        bottom: 35px;
        left: 12px;
      "
      onClick="resetVars()"
    >
      <svg
        class="svg-icon"
        style="
          width: 2em;
          height: 2em;
          vertical-align: middle;
          fill: white;
          overflow: hidden;
        "
        viewBox="0 0 1024 1024"
        version="1.1"
        xmlns="http://www.w3.org/2000/svg"
      >
        <path
          d="M512 213.994667q141.994667 0 242.005333 100.010667t100.010667 240q0 141.994667-100.992 242.005333t-241.002667 100.010667-241.002667-100.010667-100.992-242.005333l85.994667 0q0 106.005333 75.008 180.992t180.992 75.008 180.992-75.008 75.008-180.992-75.008-180.992-180.992-75.008l0 172.010667-213.994667-213.994667 213.994667-213.994667 0 172.010667z"
        />
      </svg>
    </button>

    <img id="image" src="rotations.png" style="display: none" />

    <script src="main.js"></script>
  </body>
</html>
